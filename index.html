<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ytdown Pro - Status Check</title>
    <script type="module">
        // Latest Gradio Client use kar rahe hain
        import { Client } from "https://cdn.jsdelivr.net/npm/@gradio/client/dist/index.min.js";

        async function startDownload() {
            const urlInput = document.getElementById('urlInput');
            const statusMsg = document.getElementById('statusMsg');
            const resultCard = document.getElementById('resultCard');
            const dlLink = document.getElementById('dlLink');
            const btnText = document.getElementById('btnText');
            const loader = document.getElementById('loader');

            if (!urlInput.value.trim()) {
                alert("Please paste a YouTube/Insta link first!");
                return;
            }

            // UI Reset
            statusMsg.innerText = "⏳ Connecting to Hugging Face...";
            statusMsg.style.color = "#cbd5e1";
            loader.style.display = "inline-block";
            btnText.style.display = "none";
            resultCard.style.display = "none";

            try {
                // 1. Connection Test
                console.log("Connecting to somiawann/ytdown...");
                const app = await Client.connect("somiawann/ytdown");
                
                statusMsg.innerText = "🚀 Connection Successful! Fetching link...";
                
                // 2. Predict Call (Check if endpoint is /fetch or /predict)
                // Note: Agar aapne api_name="fetch" rakha hai toh "/fetch" use karein
                const result = await app.predict("/fetch", [urlInput.value]);

                if (result.data && result.data[0]) {
                    dlLink.href = result.data[0];
                    resultCard.style.display = "block";
                    statusMsg.innerText = "✅ Video Ready!";
                    statusMsg.style.color = "#10b981";
                } else {
                    throw new Error("API returned empty data. Check your app.py logic.");
                }

            } catch (err) {
                console.error("DETAILED ERROR:", err);
                statusMsg.innerText = "❌ ERROR: " + err.message;
                statusMsg.style.color = "#ef4444";
                
                // Alert for mobile debugging
                alert("Action Failed! Error: " + err.message + "\n\nTip: Make sure your Space somiawann/ytdown is 'Running' and Public.");
            } finally {
                loader.style.display = "none";
                btnText.style.display = "inline-block";
            }
        }
        window.startDownload = startDownload;
    </script>
    <style>
        /* CSS Same as before, keeping it clean */
        :root { --primary: #6366f1; --bg: #0f172a; --card-bg: #1e293b; --text: #f8fafc; }
        body { font-family: sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .app-container { width: 100%; max-width: 400px; background: var(--card-bg); padding: 30px; border-radius: 20px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); text-align: center; }
        input { width: 100%; padding: 14px; border-radius: 10px; border: 2px solid #334155; background: #0f172a; color: white; margin-bottom: 20px; box-sizing: border-box; }
        .btn-download { width: 100%; padding: 15px; background: var(--primary); color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .loader { width: 18px; height: 18px; border: 2px solid #fff; border-bottom-color: transparent; border-radius: 50%; display: none; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .result-card { margin-top: 20px; padding: 15px; background: rgba(16,185,129,0.1); border-radius: 12px; display: none; }
        .dl-confirm-btn { display: inline-block; margin-top: 10px; padding: 10px 20px; background: #10b981; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="app-container">
        <h1>Ytdown Pro</h1>
        <input type="text" id="urlInput" placeholder="Paste link here...">
        <button class="btn-download" onclick="startDownload()">
            <span id="btnText">Get Video</span>
            <div id="loader" class="loader"></div>
        </button>
        <div id="statusMsg">Ready...</div>
        <div id="resultCard" class="result-card">
            <a id="dlLink" href="#" target="_blank" class="dl-confirm-btn">📥 DOWNLOAD NOW</a>
        </div>
    </div>
</body>
</html>

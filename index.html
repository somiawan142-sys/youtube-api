<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ytdown Pro - Premium Downloader</title>
    <style>
        /* Modern UI Design */
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --success: #10b981;
            --error: #ef4444;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            background-image: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            color: var(--text);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 420px;
            background: var(--card-bg);
            padding: 35px 25px;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            font-size: 32px;
            margin: 0 0 10px 0;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 14px;
            border: 2px solid #334155;
            background: #0f172a;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.2);
        }

        .btn-main {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--primary), #a855f7);
            color: white;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-main:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3);
        }

        .btn-main:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        #statusBox {
            margin-top: 20px;
            font-size: 14px;
            color: #cbd5e1;
            min-height: 20px;
        }

        /* Result Section */
        .result-area {
            margin-top: 25px;
            padding: 20px;
            background: rgba(16, 185, 129, 0.1);
            border: 1px dashed var(--success);
            border-radius: 18px;
            display: none;
            animation: slideUp 0.4s ease-out;
        }

        .download-btn {
            display: inline-block;
            margin-top: 12px;
            padding: 14px 28px;
            background: var(--success);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-weight: bold;
            box-shadow: 0 4px 14px rgba(16, 185, 129, 0.4);
            transition: 0.2s;
        }

        .download-btn:hover {
            background: #059669;
            transform: scale(1.03);
        }

        /* Animations */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Ytdown Pro</h1>
    <p class="subtitle">Permanent Solution for Video Downloads</p>
    
    <div class="input-group">
        <input type="text" id="urlInput" placeholder="Paste link (YouTube, Insta, TikTok)...">
    </div>
    
    <button class="btn-main" id="fetchBtn" onclick="handleDownload()">
        <span id="btnText">Get Download Link</span>
        <div id="btnSpinner" class="spinner"></div>
    </button>
    
    <div id="statusBox">Ready to download</div>

    <div id="resultArea" class="result-area">
        <p style="margin: 0 0 10px 0; color: var(--success); font-weight: 600;">✨ Video Found!</p>
        <a id="finalLink" href="#" target="_blank" class="download-link download-btn">📥 DOWNLOAD NOW</a>
    </div>

    <p style="font-size: 11px; color: #64748b; margin-top: 30px;">
        High speed fetching powered by somiawann/ytdown
    </p>
</div>

<script>
    async function handleDownload() {
        const urlInput = document.getElementById('urlInput').value.trim();
        const statusBox = document.getElementById('statusBox');
        const fetchBtn = document.getElementById('fetchBtn');
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const resultArea = document.getElementById('resultArea');
        const finalLink = document.getElementById('finalLink');

        if (!urlInput) {
            alert("Please paste a link first!");
            return;
        }

        // UI States
        fetchBtn.disabled = true;
        btnText.innerText = "Processing...";
        btnSpinner.style.display = "block";
        statusBox.innerText = "🚀 Connecting to API Bridge...";
        statusBox.style.color = "#cbd5e1";
        resultArea.style.display = "none";

        try {
            // Your Hugging Face Space API Endpoint
            const response = await fetch("https://somiawann-ytdown.hf.space/run/fetch", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    data: [urlInput]
                })
            });

            const result = await response.json();
            const output = result.data ? result.data[0] : null;

            if (output && output.startsWith("http")) {
                // Success
                finalLink.href = output;
                resultArea.style.display = "block";
                statusBox.innerText = "✅ Successfully fetched!";
                statusBox.style.color = "#10b981";
            } else {
                // Backend sent an error message
                statusBox.innerText = "❌ " + (output || "Link not found. Please try another video.");
                statusBox.style.color = "#ef4444";
            }

        } catch (error) {
            console.error("Fetch Error:", error);
            statusMsg = "❌ API Error: Make sure your Space is Public and Running.";
            statusBox.innerText = statusMsg;
            statusBox.style.color = "#ef4444";
            alert("Connection Failed!\nCheck if 'somiawann/ytdown' Space is Green (Running) on Hugging Face.");
        } finally {
            fetchBtn.disabled = false;
            btnText.innerText = "Get Download Link";
            btnSpinner.style.display = "none";
        }
    }
</script>

</body>
</html>
